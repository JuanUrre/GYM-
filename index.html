<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registro de Gimnasio</title>
<style>
  html, body { margin: 0; padding: 0; }
</style>
<style>
#gym-app-root, #gym-app-root * { box-sizing: border-box; }

#gym-app-root {
  --bg: #e6e9ef;
  --shadow-dark: #c3c8d1;
  --shadow-light: #ffffff;
  --ink: #3d4457;
  --ink-soft: #7b8296;
  --ink-faint: #a4aabb;
  --accent: #4f7ef2;
  --accent-soft: #dde6fd;
  --ok: #2fb679;
  --ok-soft: #dcf3e9;
  --warn: #e0a13a;
  --warn-soft: #faedd9;
  --bad: #e0596b;
  --bad-soft: #fbdfe3;
  font-family: 'Segoe UI', Arial, 'Helvetica Neue', Helvetica, sans-serif;
  color: var(--ink);
}

#gym-app-root {
  min-height: 100vh;
  padding: 32px 16px 60px;
  background: var(--bg);
}

.gm-wrap { max-width: 980px; margin: 0 auto; }

/* ===== HEADER ===== */
.gm-nameplate {
  position: relative;
  margin: 0 0 26px;
  text-align: center;
  padding: 22px 20px;
  background: var(--bg);
  border-radius: 22px;
  box-shadow: 9px 9px 18px var(--shadow-dark), -9px -9px 18px var(--shadow-light);
}
.gm-nameplate h1 {
  margin: 0;
  font-weight: 700;
  letter-spacing: 0.5px;
  font-size: 24px;
  color: var(--ink);
}
.gm-nameplate .gm-sub {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 2px;
  color: var(--accent);
  margin-top: 6px;
  text-transform: uppercase;
}
.gm-nameplate::before { content: none; }

.gm-theme-toggle {
  position: absolute; top: 14px; right: 16px;
  width: 34px; height: 34px; border-radius: 50%;
  border: none; cursor: pointer; font-size: 15px;
  background: var(--bg);
  box-shadow: 4px 4px 8px var(--shadow-dark), -4px -4px 8px var(--shadow-light);
  display: flex; align-items: center; justify-content: center;
}
.gm-theme-toggle:active { box-shadow: inset 2px 2px 5px var(--shadow-dark), inset -2px -2px 5px var(--shadow-light); }

.gm-conn {
  font-size: 9.5px; font-weight: 700; letter-spacing: 0.5px;
  margin-top: 10px; color: var(--ink-faint);
}
.gm-conn.on { color: var(--ok); }

/* ===== TEMA OSCURO ===== */
#gym-app-root[data-theme="dark"] {
  --bg: #2a2e37;
  --shadow-dark: #1e2129;
  --shadow-light: #363b46;
  --ink: #e7e9f0;
  --ink-soft: #9aa0b3;
  --ink-faint: #676d7f;
  --accent: #7c9cff;
  --accent-soft: #38416b;
  --ok: #3fd08c;
  --ok-soft: #1e3d31;
  --warn: #f0b45c;
  --warn-soft: #4a3a1e;
  --bad: #f0768a;
  --bad-soft: #4a2530;
}

/* ===== TABS ===== */
.gm-tabs { display: flex; gap: 12px; margin-bottom: 22px; }
.gm-tab {
  flex: 1;
  cursor: pointer;
  text-align: center;
  padding: 13px 8px;
  font-weight: 700;
  font-size: 12.5px;
  letter-spacing: 0.5px;
  color: var(--ink-soft);
  background: var(--bg);
  border: none;
  border-radius: 14px;
  box-shadow: 6px 6px 12px var(--shadow-dark), -6px -6px 12px var(--shadow-light);
  transition: all .15s ease;
}
.gm-tab.active {
  color: var(--accent);
  box-shadow: inset 4px 4px 8px var(--shadow-dark), inset -4px -4px 8px var(--shadow-light);
}
.gm-tab:hover { color: var(--ink); }

/* ===== CASE / PANEL ===== */
.gm-binder {
  position: relative;
  background: transparent;
  border-radius: 0;
  box-shadow: none;
  padding: 0;
}
.gm-rivet { display: none; }

.gm-panel {
  background: var(--bg);
  border-radius: 22px;
  padding: 26px 24px;
  box-shadow: 9px 9px 18px var(--shadow-dark), -9px -9px 18px var(--shadow-light);
  min-height: 420px;
  position: relative;
}

/* ===== STAT BLOCKS ===== */
.gm-lcd-row {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
  gap: 16px;
  margin-bottom: 26px;
}
.gm-lcd {
  background: var(--bg);
  border-radius: 16px;
  padding: 16px 16px;
  box-shadow: 6px 6px 12px var(--shadow-dark), -6px -6px 12px var(--shadow-light);
}
.gm-lcd .gm-lcd-label {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 1px;
  color: var(--ink-soft);
  margin-bottom: 8px;
  text-transform: uppercase;
}
.gm-lcd .gm-lcd-value {
  font-size: 28px;
  font-weight: 700;
  color: var(--accent);
}
.gm-lcd.warn .gm-lcd-value { color: var(--warn); }
.gm-lcd.bad .gm-lcd-value { color: var(--bad); }

.gm-section-title {
  font-weight: 700;
  font-size: 14px;
  letter-spacing: 0.3px;
  color: var(--ink);
  border-bottom: none;
  padding-bottom: 0;
  margin: 0 0 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.gm-section-title::before { content: none; }

.gm-alert-list { display: flex; flex-direction: column; gap: 10px; }
.gm-alert-item {
  display: flex; justify-content: space-between; align-items: center;
  background: var(--bg);
  border-left: none;
  padding: 12px 16px;
  border-radius: 14px;
  font-size: 12.5px;
  color: var(--ink-soft);
  box-shadow: 4px 4px 10px var(--shadow-dark), -4px -4px 10px var(--shadow-light);
}
.gm-alert-item.bad { box-shadow: 4px 4px 10px var(--shadow-dark), -4px -4px 10px var(--shadow-light), inset 3px 0 0 var(--bad); }
.gm-alert-item:not(.bad) { box-shadow: 4px 4px 10px var(--shadow-dark), -4px -4px 10px var(--shadow-light), inset 3px 0 0 var(--warn); }
.gm-alert-item b { color: var(--ink); font-weight: 700; }

/* ===== SEARCH ===== */
.gm-search-bar { display: flex; gap: 12px; margin-bottom: 20px; align-items: center; flex-wrap: wrap; }
.gm-slot {
  flex: 1; min-width: 180px;
  background: var(--bg);
  border-radius: 999px;
  padding: 11px 18px;
  box-shadow: inset 4px 4px 8px var(--shadow-dark), inset -4px -4px 8px var(--shadow-light);
  color: var(--ink);
}
.gm-slot input {
  width: 100%; border: none; background: transparent; outline: none;
  color: var(--ink); font-family: inherit; font-size: 13px; font-weight: 500;
}
.gm-slot input::placeholder { color: var(--ink-faint); }

select.gm-filter {
  padding: 11px 16px;
  border-radius: 999px;
  border: none;
  background: var(--bg);
  font-family: inherit;
  font-weight: 600;
  font-size: 11.5px;
  color: var(--ink-soft);
  box-shadow: 4px 4px 8px var(--shadow-dark), -4px -4px 8px var(--shadow-light);
}

/* ===== MEMBER CARDS ===== */
.gm-card-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 18px;
}

.gm-id-card {
  position: relative;
  border-radius: 18px;
  background: var(--bg);
  border: none;
  overflow: hidden;
  cursor: pointer;
  transition: transform .12s ease, box-shadow .12s ease;
  box-shadow: 6px 6px 14px var(--shadow-dark), -6px -6px 14px var(--shadow-light);
  background-image: none;
}
.gm-id-card:hover { transform: translateY(-3px); }

.gm-id-strip { height: 5px; }
.gm-id-strip.ok { background: var(--ok); }
.gm-id-strip.warn { background: var(--warn); }
.gm-id-strip.bad { background: var(--bad); }

.gm-id-body { padding: 16px 16px 8px; display: flex; gap: 12px; }
.gm-avatar {
  flex-shrink: 0;
  width: 44px; height: 44px; border-radius: 50%;
  background: var(--bg);
  color: var(--accent);
  display: flex; align-items: center; justify-content: center;
  font-weight: 700; font-size: 15px;
  box-shadow: 3px 3px 7px var(--shadow-dark), -3px -3px 7px var(--shadow-light);
}
.gm-id-info { flex: 1; min-width: 0; }
.gm-id-info .gm-name { font-weight: 700; font-size: 15px; color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.gm-id-info .gm-plan { font-size: 11.5px; color: var(--ink-soft); margin-top: 3px; font-weight: 500; }
.gm-id-info .gm-dates { font-size: 10.5px; color: var(--ink-faint); margin-top: 5px; font-weight: 500; }
.gm-status-pill {
  display: inline-block; margin-top: 8px;
  font-size: 9.5px; letter-spacing: 0.5px; padding: 3px 10px; border-radius: 999px;
  font-weight: 700; text-transform: uppercase;
}
.gm-status-pill.ok { background: var(--ok-soft); color: var(--ok); }
.gm-status-pill.warn { background: var(--warn-soft); color: var(--warn); }
.gm-status-pill.bad { background: var(--bad-soft); color: var(--bad); }

.gm-id-barcode { display: none; }

/* ===== FORM ===== */
.gm-clip { display: none; }

.gm-form { display: grid; grid-template-columns: 1fr 1fr; gap: 18px 20px; margin-top: 4px; }
.gm-form .full { grid-column: 1 / -1; }
.gm-field label {
  display: block; font-size: 10.5px; letter-spacing: 0.5px; text-transform: uppercase;
  color: var(--ink-soft); margin-bottom: 7px; font-weight: 700;
}
.gm-field input, .gm-field select {
  width: 100%; padding: 12px 14px;
  border: none;
  background: var(--bg);
  font-family: inherit; font-size: 13.5px; font-weight: 500; color: var(--ink);
  border-radius: 12px;
  outline: none;
  box-shadow: inset 3px 3px 7px var(--shadow-dark), inset -3px -3px 7px var(--shadow-light);
}
.gm-field input:focus, .gm-field select:focus { box-shadow: inset 3px 3px 7px var(--shadow-dark), inset -3px -3px 7px var(--shadow-light), 0 0 0 2px var(--accent-soft); }

/* ===== BUTTONS ===== */
.gm-btn {
  font-family: inherit; font-weight: 700; font-size: 12px; letter-spacing: 0.3px;
  padding: 12px 22px; border-radius: 14px; cursor: pointer;
  border: none;
  color: var(--ink-soft);
  background: var(--bg);
  box-shadow: 5px 5px 10px var(--shadow-dark), -5px -5px 10px var(--shadow-light);
  transition: all .1s ease;
}
.gm-btn:hover { color: var(--ink); }
.gm-btn:active { box-shadow: inset 3px 3px 7px var(--shadow-dark), inset -3px -3px 7px var(--shadow-light); }
.gm-btn.primary { color: var(--accent); }
.gm-btn.danger { color: var(--bad); }
.gm-btn.small { padding: 8px 14px; font-size: 10.5px; border-radius: 10px; }
.gm-btn:disabled { opacity: 0.4; cursor: not-allowed; }

.gm-form-actions { grid-column: 1 / -1; display: flex; gap: 12px; justify-content: flex-end; margin-top: 8px; }

/* ===== MODAL ===== */
.gm-modal-overlay {
  position: fixed; inset: 0; background: rgba(61,68,87,0.35);
  display: flex; align-items: center; justify-content: center; z-index: 50; padding: 16px;
}
.gm-ticket {
  background: var(--bg);
  border: none;
  width: 100%; max-width: 420px; border-radius: 22px;
  padding: 26px 26px 22px;
  box-shadow: 12px 12px 26px rgba(61,68,87,0.35), -8px -8px 20px rgba(255,255,255,0.7);
  position: relative;
  max-height: 86vh; overflow-y: auto;
}
.gm-ticket-close {
  position: absolute; top: 16px; right: 18px; cursor: pointer;
  font-weight: 700; color: var(--ink-soft); font-size: 16px;
  background: none; border: none;
}
.gm-ticket-close:hover { color: var(--ink); }
.gm-ticket h2 { font-weight: 700; margin: 0 0 4px; font-size: 19px; color: var(--ink); }
.gm-ticket .gm-ticket-sub { font-size: 12px; color: var(--ink-soft); margin-bottom: 14px; font-weight: 500; }

.gm-history { margin-top: 16px; }
.gm-history-item {
  display: flex; justify-content: space-between; font-size: 12px;
  border-bottom: 1px solid rgba(163,170,192,0.25); padding: 8px 0;
  color: var(--ink-soft); font-weight: 500;
}
.gm-history-item span.gm-amt { font-weight: 700; color: var(--ok); }

.gm-empty {
  text-align: center; padding: 60px 10px; color: var(--ink-faint); font-weight: 600;
  font-size: 13px;
}

@media (max-width: 640px) {
  .gm-form { grid-template-columns: 1fr; }
  .gm-nameplate h1 { font-size: 19px; }
}

</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<div id="gym-app-root"></div>
<script>
(function(){
  const root = document.getElementById('gym-app-root');
  const STORAGE_KEY = 'gym_members_v1';
  const THEME_KEY = 'gym_theme_v1';

  // ============ CONEXIÓN A SUPABASE ============
  // 1. Crea un proyecto gratis en https://supabase.com
  // 2. Ejecuta el script SQL que te compartí en el SQL Editor de tu proyecto
  // 3. Pega aquí tu Project URL y tu anon public key (Settings → API)
  const SUPABASE_URL = 'https://ijtpavqypkhjrfzgcdrw.supabase.co/rest/v1/';       // Ej: 'https://xxxxxxxx.supabase.co'
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlqdHBhdnF5cGtoanJmemdjZHJ3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQwNzUzMTUsImV4cCI6MjA5OTY1MTMxNX0.98AEybzJlfgdDSIR0aRBVApQ_SnQvtNs-m0y1FvIYGo';  // Ej: 'eyJhbGciOi...'

  let sb = null;
  try {
    if (SUPABASE_URL && SUPABASE_ANON_KEY && window.supabase) {
      sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    }
  } catch(e) { console.warn('Supabase no configurado, usando almacenamiento local.', e); }

  let members = [];
  let activeTab = 'dashboard';
  let searchTerm = '';
  let filterStatus = 'todos';
  let modalMember = null; // id of member shown in modal
  let modalMode = null; // 'view' | 'renew' | 'edit'
  let loaded = false;
  let theme = 'light';
  let dbError = false;

  const PLAN_MONTHS = { 'Mensual': 1, 'Trimestral': 3, 'Semestral': 6, 'Anual': 12 };

  function uid(){ return 'm_' + Date.now().toString(36) + Math.random().toString(36).slice(2,7); }

  function todayISO(){ return new Date().toISOString().slice(0,10); }

  function addMonths(dateStr, months){
    const d = new Date(dateStr + 'T00:00:00');
    d.setMonth(d.getMonth() + months);
    return d.toISOString().slice(0,10);
  }

  function daysBetween(a, b){
    const d1 = new Date(a + 'T00:00:00');
    const d2 = new Date(b + 'T00:00:00');
    return Math.round((d2 - d1) / 86400000);
  }

  function fmtDate(iso){
    if(!iso) return '-';
    const [y,m,d] = iso.split('-');
    return `${d}/${m}/${y}`;
  }

  function statusOf(member){
    const today = todayISO();
    const diff = daysBetween(today, member.fechaFin);
    if(diff < 0) return 'bad';
    if(diff <= 7) return 'warn';
    return 'ok';
  }
  function statusLabel(s){
    return s === 'ok' ? 'Activo' : s === 'warn' ? 'Por vencer' : 'Vencido';
  }

  function initials(name){
    return name.trim().split(/\s+/).slice(0,2).map(w=>w[0]?.toUpperCase()||'').join('');
  }

  // ============ CAPA DE DATOS (Supabase o local) ============
  function rowToMember(row){
    return {
      id: row.id, nombre: row.nombre, documento: row.documento,
      telefono: row.telefono, email: row.email, plan: row.plan,
      monto: row.monto, fechaInicio: row.fecha_inicio, fechaFin: row.fecha_fin,
      notas: row.notas, pagos: row.pagos || []
    };
  }
  function memberToRow(m){
    return {
      id: m.id, nombre: m.nombre, documento: m.documento || null,
      telefono: m.telefono || null, email: m.email || null, plan: m.plan,
      monto: m.monto, fecha_inicio: m.fechaInicio, fecha_fin: m.fechaFin,
      notas: m.notas || null, pagos: m.pagos || []
    };
  }

  async function loadLocal(){
    try{
      const res = await window.storage.get(STORAGE_KEY, false);
      return res && res.value ? JSON.parse(res.value) : [];
    }catch(e){ return []; }
  }
  async function saveLocal(){
    try{ await window.storage.set(STORAGE_KEY, JSON.stringify(members), false); }
    catch(e){ console.error('No se pudo guardar', e); }
  }

  async function load(){
    if(sb){
      const { data, error } = await sb.from('members').select('*').order('nombre');
      if(error){ console.error(error); dbError = true; members = await loadLocal(); }
      else { members = data.map(rowToMember); }
    } else {
      members = await loadLocal();
    }
    loaded = true;
    render();
  }

  async function dbInsert(member){
    members.push(member);
    if(sb){
      const { error } = await sb.from('members').insert(memberToRow(member));
      if(error){ console.error(error); alert('No se pudo guardar en Supabase: ' + error.message); }
    } else {
      await saveLocal();
    }
  }

  async function dbUpdate(id, patch){
    const m = members.find(x => x.id === id);
    if(!m) return;
    Object.assign(m, patch);
    if(sb){
      const row = memberToRow(m);
      delete row.id;
      const { error } = await sb.from('members').update(row).eq('id', id);
      if(error){ console.error(error); alert('No se pudo actualizar en Supabase: ' + error.message); }
    } else {
      await saveLocal();
    }
  }

  async function dbDelete(id){
    members = members.filter(x => x.id !== id);
    if(sb){
      const { error } = await sb.from('members').delete().eq('id', id);
      if(error){ console.error(error); alert('No se pudo eliminar en Supabase: ' + error.message); }
    } else {
      await saveLocal();
    }
  }

  // ============ TEMA CLARO / OSCURO ============
  async function loadTheme(){
    try{
      const res = await window.storage.get(THEME_KEY, false);
      theme = res && res.value ? res.value : 'light';
    }catch(e){ theme = 'light'; }
    applyTheme();
  }
  function applyTheme(){ root.setAttribute('data-theme', theme); }
  async function toggleTheme(){
    theme = theme === 'dark' ? 'light' : 'dark';
    applyTheme();
    render();
    try{ await window.storage.set(THEME_KEY, theme, false); }catch(e){}
  }

  function escapeHtml(str){
    return String(str).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  // ===================== RENDER =====================
  function render(){
    if(!loaded){
      root.innerHTML = `<div class="gm-wrap"><div class="gm-binder"><div class="gm-empty">Cargando registro...</div></div></div>`;
      return;
    }

    root.innerHTML = `
      <div class="gm-wrap">
        <div class="gm-nameplate">
          <button class="gm-theme-toggle" data-action="toggle-theme" title="Cambiar tema">${theme==='dark' ? '☀️' : '🌙'}</button>
          <h1>REGISTRO DE GIMNASIO</h1>
          <div class="gm-sub">CONTROL DE MIEMBROS &amp; PAGOS</div>
          <div class="gm-conn ${sb ? 'on' : 'off'}">${sb ? (dbError ? '● Error de conexión — usando respaldo local' : '● Conectado a Supabase') : '● Modo local (sin Supabase configurado)'}</div>
        </div>
        <div class="gm-tabs">
          <div class="gm-tab ${activeTab==='dashboard'?'active':''}" data-tab="dashboard">📋 Panel</div>
          <div class="gm-tab ${activeTab==='members'?'active':''}" data-tab="members">🪪 Miembros</div>
          <div class="gm-tab ${activeTab==='new'?'active':''}" data-tab="new">✎ Nuevo</div>
        </div>
        <div class="gm-binder">
          <div class="gm-rivet tl"></div><div class="gm-rivet tr"></div>
          <div class="gm-rivet bl"></div><div class="gm-rivet br"></div>
          <div class="gm-panel" style="z-index:1;">
            ${activeTab==='dashboard' ? renderDashboard() : ''}
            ${activeTab==='members' ? renderMembers() : ''}
            ${activeTab==='new' ? renderNewForm() : ''}
          </div>
        </div>
      </div>
      ${modalMember ? renderModal() : ''}
    `;
    attachEvents();
  }

  function renderDashboard(){
    const total = members.length;
    const activos = members.filter(m => statusOf(m) === 'ok').length;
    const porVencer = members.filter(m => statusOf(m) === 'warn').length;
    const vencidos = members.filter(m => statusOf(m) === 'bad').length;

    const now = new Date();
    const ym = now.toISOString().slice(0,7);
    let ingresosMes = 0;
    members.forEach(m => (m.pagos||[]).forEach(p => { if(p.fecha.startsWith(ym)) ingresosMes += Number(p.monto)||0; }));

    const alerts = members
      .filter(m => statusOf(m) !== 'ok')
      .sort((a,b) => a.fechaFin.localeCompare(b.fechaFin));

    return `
      <div class="gm-lcd-row">
        <div class="gm-lcd"><div class="gm-lcd-label">Total miembros</div><div class="gm-lcd-value">${total}</div></div>
        <div class="gm-lcd"><div class="gm-lcd-label">Activos</div><div class="gm-lcd-value">${activos}</div></div>
        <div class="gm-lcd warn"><div class="gm-lcd-label">Por vencer</div><div class="gm-lcd-value">${porVencer}</div></div>
        <div class="gm-lcd bad"><div class="gm-lcd-label">Vencidos</div><div class="gm-lcd-value">${vencidos}</div></div>
        <div class="gm-lcd"><div class="gm-lcd-label">Ingresos del mes</div><div class="gm-lcd-value">$${ingresosMes.toLocaleString('es-CO')}</div></div>
      </div>
      <div class="gm-section-title">Vencimientos y pendientes</div>
      ${alerts.length ? `<div class="gm-alert-list">
        ${alerts.map(m => {
          const s = statusOf(m);
          const diff = daysBetween(todayISO(), m.fechaFin);
          const txt = s === 'bad' ? `Vencido hace ${Math.abs(diff)} día(s)` : `Vence en ${diff} día(s)`;
          return `<div class="gm-alert-item ${s}">
            <div><b>${escapeHtml(m.nombre)}</b> — ${escapeHtml(m.plan)} — ${txt} (${fmtDate(m.fechaFin)})</div>
            <button class="gm-btn small" data-action="renew" data-id="${m.id}">Renovar</button>
          </div>`;
        }).join('')}
      </div>` : `<div class="gm-empty">Sin pendientes. Todo el mundo está al día 💪</div>`}
    `;
  }

  function renderMembers(){
    let list = members.filter(m => {
      const term = searchTerm.toLowerCase();
      const okSearch = !searchTerm || m.nombre.toLowerCase().includes(term) || (m.telefono||'').includes(searchTerm) || (m.documento||'').toLowerCase().includes(term);
      const okFilter = filterStatus === 'todos' || statusOf(m) === filterStatus;
      return okSearch && okFilter;
    }).sort((a,b) => a.nombre.localeCompare(b.nombre));

    return `
      <div class="gm-section-title">Carnets de miembros <span style="font-size:11px;color:#8a7a5c;">${list.length} de ${members.length}</span></div>
      <div class="gm-search-bar">
        <div class="gm-slot">🔍 <input type="text" id="gm-search" placeholder="Buscar por nombre, documento o teléfono..." value="${escapeHtml(searchTerm)}"/></div>
        <select class="gm-filter" id="gm-filter">
          <option value="todos" ${filterStatus==='todos'?'selected':''}>Todos</option>
          <option value="ok" ${filterStatus==='ok'?'selected':''}>Activos</option>
          <option value="warn" ${filterStatus==='warn'?'selected':''}>Por vencer</option>
          <option value="bad" ${filterStatus==='bad'?'selected':''}>Vencidos</option>
        </select>
      </div>
      ${list.length ? `<div class="gm-card-grid">
        ${list.map(m => {
          const s = statusOf(m);
          return `
          <div class="gm-id-card" data-action="view" data-id="${m.id}">
            <div class="gm-id-strip ${s}"></div>
            <div class="gm-id-body">
              <div class="gm-avatar">${initials(m.nombre)}</div>
              <div class="gm-id-info">
                <div class="gm-name">${escapeHtml(m.nombre)}</div>
                <div class="gm-plan">Doc. ${escapeHtml(m.documento||'—')} · ${escapeHtml(m.plan)} · $${Number(m.monto).toLocaleString('es-CO')}</div>
                <div class="gm-dates">${fmtDate(m.fechaInicio)} → ${fmtDate(m.fechaFin)}</div>
                <span class="gm-status-pill ${s}">${statusLabel(s)}</span>
              </div>
            </div>
            <div class="gm-id-barcode"></div>
          </div>`;
        }).join('')}
      </div>` : `<div class="gm-empty">No hay miembros que coincidan.</div>`}
    `;
  }

  function renderNewForm(){
    return `
      <div class="gm-clip"></div>
      <div class="gm-section-title">Ficha de nuevo miembro</div>
      <form class="gm-form" id="gm-new-form">
        <div class="gm-field"><label>Nombre completo</label><input type="text" name="nombre" required placeholder="Ej. Juan Pérez"/></div>
        <div class="gm-field"><label>N° de documento</label><input type="text" name="documento" required placeholder="Ej. 1017123456"/></div>
        <div class="gm-field"><label>Teléfono</label><input type="text" name="telefono" placeholder="Ej. 300 000 0000"/></div>
        <div class="gm-field"><label>Correo (opcional)</label><input type="email" name="email" placeholder="correo@ejemplo.com"/></div>
        <div class="gm-field"><label>Plan</label>
          <select name="plan">
            <option value="Mensual">Mensual (1 mes)</option>
            <option value="Trimestral">Trimestral (3 meses)</option>
            <option value="Semestral">Semestral (6 meses)</option>
            <option value="Anual">Anual (12 meses)</option>
          </select>
        </div>
        <div class="gm-field"><label>Monto pagado</label><input type="number" name="monto" min="0" step="1000" required placeholder="Ej. 80000"/></div>
        <div class="gm-field"><label>Método de pago</label>
          <select name="metodoPago">
            <option>Efectivo</option><option>Transferencia</option><option>Tarjeta</option><option>Otro</option>
          </select>
        </div>
        <div class="gm-field"><label>Fecha de inicio</label><input type="date" name="fechaInicio" value="${todayISO()}" required/></div>
        <div class="gm-field full"><label>Notas (opcional)</label><input type="text" name="notas" placeholder="Ej. lesión previa, horario preferido..."/></div>
        <div class="gm-form-actions">
          <button type="submit" class="gm-btn primary">Registrar miembro</button>
        </div>
      </form>
    `;
  }

  function renderModal(){
    const m = members.find(x => x.id === modalMember);
    if(!m) return '';
    const s = statusOf(m);

    if(modalMode === 'renew'){
      const baseDate = statusOf(m) === 'bad' ? todayISO() : m.fechaFin;
      return `
      <div class="gm-modal-overlay" id="gm-overlay">
        <div class="gm-ticket">
          <button class="gm-ticket-close" data-action="close">✕</button>
          <h2>Renovar plan</h2>
          <div class="gm-ticket-sub">${escapeHtml(m.nombre)}</div>
          <form id="gm-renew-form" class="gm-form" style="grid-template-columns:1fr;">
            <div class="gm-field"><label>Plan</label>
              <select name="plan">
                <option value="Mensual">Mensual (1 mes)</option>
                <option value="Trimestral">Trimestral (3 meses)</option>
                <option value="Semestral">Semestral (6 meses)</option>
                <option value="Anual">Anual (12 meses)</option>
              </select>
            </div>
            <div class="gm-field"><label>Monto pagado</label><input type="number" name="monto" min="0" step="1000" required value="${m.monto}"/></div>
            <div class="gm-field"><label>Método de pago</label>
              <select name="metodoPago"><option>Efectivo</option><option>Transferencia</option><option>Tarjeta</option><option>Otro</option></select>
            </div>
            <div class="gm-field"><label>Fecha de inicio del nuevo periodo</label><input type="date" name="fechaInicio" value="${baseDate}" required/></div>
            <div class="gm-form-actions">
              <button type="button" class="gm-btn" data-action="close">Cancelar</button>
              <button type="submit" class="gm-btn primary">Confirmar pago</button>
            </div>
          </form>
        </div>
      </div>`;
    }

    if(modalMode === 'edit'){
      return `
      <div class="gm-modal-overlay" id="gm-overlay">
        <div class="gm-ticket">
          <button class="gm-ticket-close" data-action="close">✕</button>
          <h2>Editar miembro</h2>
          <form id="gm-edit-form" class="gm-form" style="grid-template-columns:1fr;">
            <div class="gm-field"><label>Nombre</label><input type="text" name="nombre" required value="${escapeHtml(m.nombre)}"/></div>
            <div class="gm-field"><label>N° de documento</label><input type="text" name="documento" value="${escapeHtml(m.documento||'')}"/></div>
            <div class="gm-field"><label>Teléfono</label><input type="text" name="telefono" value="${escapeHtml(m.telefono||'')}"/></div>
            <div class="gm-field"><label>Correo</label><input type="email" name="email" value="${escapeHtml(m.email||'')}"/></div>
            <div class="gm-field"><label>Notas</label><input type="text" name="notas" value="${escapeHtml(m.notas||'')}"/></div>
            <div class="gm-field"><label>Fecha fin actual (ajuste manual)</label><input type="date" name="fechaFin" value="${m.fechaFin}"/></div>
            <div class="gm-form-actions">
              <button type="button" class="gm-btn" data-action="close">Cancelar</button>
              <button type="submit" class="gm-btn primary">Guardar cambios</button>
            </div>
          </form>
        </div>
      </div>`;
    }

    // view mode
    const historial = (m.pagos||[]).slice().reverse();
    return `
    <div class="gm-modal-overlay" id="gm-overlay">
      <div class="gm-ticket">
        <button class="gm-ticket-close" data-action="close">✕</button>
        <h2>${escapeHtml(m.nombre)}</h2>
        <div class="gm-ticket-sub">Doc. ${escapeHtml(m.documento||'—')} · ${escapeHtml(m.telefono||'sin teléfono')} ${m.email ? '· '+escapeHtml(m.email) : ''}</div>
        <span class="gm-status-pill ${s}">${statusLabel(s)}</span>
        <div style="margin-top:12px; font-size:13px; line-height:1.7;">
          <div><b>Plan actual:</b> ${escapeHtml(m.plan)}</div>
          <div><b>Monto último pago:</b> $${Number(m.monto).toLocaleString('es-CO')}</div>
          <div><b>Inicio periodo:</b> ${fmtDate(m.fechaInicio)}</div>
          <div><b>Fin periodo:</b> ${fmtDate(m.fechaFin)}</div>
          ${m.notas ? `<div><b>Notas:</b> ${escapeHtml(m.notas)}</div>` : ''}
        </div>
        <div class="gm-history">
          <div class="gm-section-title" style="font-size:12px;">Historial de pagos</div>
          ${historial.length ? historial.map(p => `
            <div class="gm-history-item">
              <span>${fmtDate(p.fecha)} · ${escapeHtml(p.plan)} · ${escapeHtml(p.metodoPago||'')}</span>
              <span class="gm-amt">$${Number(p.monto).toLocaleString('es-CO')}</span>
            </div>`).join('') : `<div style="font-size:12px;color:#8a7a5c;">Sin pagos registrados aún.</div>`}
        </div>
        <div class="gm-form-actions" style="margin-top:16px;">
          <button class="gm-btn danger small" data-action="delete" data-id="${m.id}">Eliminar</button>
          <button class="gm-btn small" data-action="edit" data-id="${m.id}">Editar</button>
          <button class="gm-btn primary small" data-action="renew" data-id="${m.id}">Renovar plan</button>
        </div>
      </div>
    </div>`;
  }

  // ===================== EVENTS =====================
  function attachEvents(){
    root.querySelectorAll('.gm-tab').forEach(el => {
      el.addEventListener('click', () => { activeTab = el.dataset.tab; render(); });
    });

    const searchInput = root.querySelector('#gm-search');
    if(searchInput){
      searchInput.addEventListener('input', (e) => {
        searchTerm = e.target.value;
        const list = root.querySelector('.gm-card-grid, .gm-empty');
        render();
        // restore focus & cursor
        requestAnimationFrame(() => {
          const inp = root.querySelector('#gm-search');
          if(inp){ inp.focus(); inp.selectionStart = inp.selectionEnd = inp.value.length; }
        });
      });
    }
    const filterSel = root.querySelector('#gm-filter');
    if(filterSel){
      filterSel.addEventListener('change', (e) => { filterStatus = e.target.value; render(); });
    }

    const newForm = root.querySelector('#gm-new-form');
    if(newForm){
      newForm.addEventListener('submit', (e) => {
        e.preventDefault();
        const fd = new FormData(newForm);
        const plan = fd.get('plan');
        const fechaInicio = fd.get('fechaInicio') || todayISO();
        const months = PLAN_MONTHS[plan] || 1;
        const fechaFin = addMonths(fechaInicio, months);
        const monto = Number(fd.get('monto')) || 0;
        const documento = fd.get('documento').trim();
        if(documento && members.some(m => m.documento === documento)){
          alert('Ya existe un miembro registrado con ese número de documento.');
          return;
        }
        const nuevo = {
          id: uid(),
          nombre: fd.get('nombre').trim(),
          documento,
          telefono: fd.get('telefono').trim(),
          email: fd.get('email').trim(),
          plan, monto, fechaInicio, fechaFin,
          notas: fd.get('notas').trim(),
          pagos: [{ fecha: fechaInicio, monto, plan, metodoPago: fd.get('metodoPago') }]
        };
        activeTab = 'members';
        dbInsert(nuevo);
        render();
      });
    }

    const themeToggle = root.querySelector('[data-action="toggle-theme"]');
    if(themeToggle){
      themeToggle.addEventListener('click', () => toggleTheme());
    }

    root.querySelectorAll('[data-action="view"]').forEach(el => {
      el.addEventListener('click', () => { modalMember = el.dataset.id; modalMode = 'view'; render(); });
    });
    root.querySelectorAll('[data-action="renew"]').forEach(el => {
      el.addEventListener('click', (e) => { e.stopPropagation(); modalMember = el.dataset.id; modalMode = 'renew'; render(); });
    });
    root.querySelectorAll('[data-action="edit"]').forEach(el => {
      el.addEventListener('click', (e) => { e.stopPropagation(); modalMember = el.dataset.id; modalMode = 'edit'; render(); });
    });
    root.querySelectorAll('[data-action="delete"]').forEach(el => {
      el.addEventListener('click', (e) => {
        e.stopPropagation();
        const id = el.dataset.id;
        const m = members.find(x => x.id === id);
        if(m && confirm(`¿Eliminar a ${m.nombre} del registro? Esta acción no se puede deshacer.`)){
          modalMember = null; modalMode = null;
          dbDelete(id);
          render();
        }
      });
    });
    root.querySelectorAll('[data-action="close"]').forEach(el => {
      el.addEventListener('click', () => { modalMember = null; modalMode = null; render(); });
    });
    const overlay = root.querySelector('#gm-overlay');
    if(overlay){
      overlay.addEventListener('click', (e) => { if(e.target === overlay){ modalMember = null; modalMode = null; render(); } });
    }

    const renewForm = root.querySelector('#gm-renew-form');
    if(renewForm){
      renewForm.addEventListener('submit', (e) => {
        e.preventDefault();
        const fd = new FormData(renewForm);
        const m = members.find(x => x.id === modalMember);
        if(!m) return;
        const plan = fd.get('plan');
        const months = PLAN_MONTHS[plan] || 1;
        const fechaInicio = fd.get('fechaInicio');
        const fechaFin = addMonths(fechaInicio, months);
        const monto = Number(fd.get('monto')) || 0;
        const pagos = (m.pagos || []).concat([{ fecha: fechaInicio, monto, plan, metodoPago: fd.get('metodoPago') }]);
        modalMode = 'view';
        dbUpdate(m.id, { plan, monto, fechaInicio, fechaFin, pagos });
        render();
      });
    }

    const editForm = root.querySelector('#gm-edit-form');
    if(editForm){
      editForm.addEventListener('submit', (e) => {
        e.preventDefault();
        const fd = new FormData(editForm);
        const m = members.find(x => x.id === modalMember);
        if(!m) return;
        const nuevoDoc = fd.get('documento').trim();
        if(nuevoDoc && members.some(x => x.documento === nuevoDoc && x.id !== m.id)){
          alert('Ya existe otro miembro registrado con ese número de documento.');
          return;
        }
        const nombre = fd.get('nombre').trim();
        const telefono = fd.get('telefono').trim();
        const email = fd.get('email').trim();
        const notas = fd.get('notas').trim();
        const patch = { nombre, documento: nuevoDoc, telefono, email, notas };
        if(fd.get('fechaFin')) patch.fechaFin = fd.get('fechaFin');
        modalMode = 'view';
        dbUpdate(m.id, patch);
        render();
      });
    }
  }

  loadTheme();
  load();
})();
</script>
</body>
</html>
